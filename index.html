<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playgrounds & BBQ Spots – Zürich</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex; height: 100dvh; overflow: hidden;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 340px; min-width: 280px;
      display: flex; flex-direction: column;
      background: #fff;
      box-shadow: 2px 0 8px rgba(0,0,0,.12);
      z-index: 1000; overflow: hidden;
    }

    #sidebar-header {
      padding: 12px 16px;
      background: #1a6e3c; color: #fff; flex-shrink: 0;
    }
    #sidebar-header h1 { font-size: 16px; font-weight: 700; }
    #sidebar-header p  { font-size: 11px; opacity: .75; margin-top: 1px; }
    #count-badge {
      display: inline-block; background: rgba(255,255,255,.25);
      border-radius: 20px; padding: 1px 8px; font-size: 11px; margin-top: 4px;
    }

    /* ── Category toggles ── */
    #categories { padding: 10px 12px; border-bottom: 1px solid #eee; flex-shrink: 0; }
    #categories-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: #999; margin-bottom: 6px;
    }
    #cat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }

    .cat-btn {
      display: flex; align-items: center; gap: 6px;
      padding: 7px 10px; border-radius: 8px;
      border: 2px solid #e0e0e0; background: #f9f9f9;
      font-size: 12px; font-weight: 500; color: #666;
      cursor: pointer; transition: all .15s; text-align: left; line-height: 1.2;
    }
    .cat-btn .cb-icon  { font-size: 16px; flex-shrink: 0; }
    .cat-btn .cb-text  { flex: 1; }
    .cat-btn .cb-count { font-size: 10px; opacity: .65; }

    .cat-btn.active[data-cat="sp_city"] { background: #1a6e3c; border-color: #1a6e3c; color: #fff; }
    .cat-btn.active[data-cat="sp_osm"]  { background: #388e3c; border-color: #388e3c; color: #fff; }
    .cat-btn.active[data-cat="bbq"]     { background: #c62828; border-color: #c62828; color: #fff; }
    .cat-btn.active[data-cat="picnic"]  { background: #e65100; border-color: #e65100; color: #fff; }

    /* ── Filters ── */
    #filters {
      padding: 10px 12px; border-bottom: 1px solid #eee;
      display: flex; flex-direction: column; gap: 8px; flex-shrink: 0;
    }
    .filter-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: .5px; color: #999; margin-bottom: 3px; display: block;
    }
    input[type="text"], select {
      width: 100%; padding: 7px 10px;
      border: 1px solid #ddd; border-radius: 6px; font-size: 13px; outline: none;
    }
    input[type="text"]:focus, select:focus { border-color: #1a6e3c; }

    #equipment-filter { display: flex; flex-wrap: wrap; gap: 4px; }
    .equip-chip {
      padding: 3px 8px; border: 1px solid #ccc; border-radius: 20px;
      font-size: 11px; cursor: pointer; background: #fff; user-select: none; white-space: nowrap;
      transition: all .12s;
    }
    .equip-chip.active { background: #1a6e3c; border-color: #1a6e3c; color: #fff; }

    #filter-actions { display: flex; align-items: center; justify-content: space-between; }
    #btn-locate {
      display: flex; align-items: center; gap: 5px;
      padding: 6px 11px; background: #1a6e3c; color: #fff;
      border: none; border-radius: 6px; font-size: 12px; cursor: pointer;
    }
    #btn-locate:hover { background: #145530; }
    #btn-clear { font-size: 11px; color: #1a6e3c; background: none; border: none; cursor: pointer; text-decoration: underline; }

    /* ── List ── */
    #list { flex: 1; overflow-y: auto; padding: 4px 0; }
    .item {
      padding: 8px 14px; border-bottom: 1px solid #f0f0f0;
      cursor: pointer; transition: background .1s; display: flex; gap: 8px; align-items: flex-start;
    }
    .item:hover { background: #f7faf8; }
    .item.highlighted { background: #e8f5ee; }
    .item-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-top: 4px; }
    .item-body { flex: 1; min-width: 0; }
    .item-name { font-weight: 600; font-size: 13px; color: #1a1a1a; }
    .item-sub  { font-size: 11px; color: #888; margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .item-tags { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
    .tag       { font-size: 10px; padding: 1px 6px; border-radius: 10px; background: #e8f5ee; color: #1a6e3c; }
    .tag.age   { background: #fff3e0; color: #e65100; }
    .tag.red   { background: #ffebee; color: #c62828; }
    .tag.amber { background: #fff8e1; color: #f57f17; }
    .item-dist { font-size: 10px; color: #bbb; margin-top: 2px; }

    #no-results { text-align: center; padding: 32px 16px; color: #aaa; font-size: 13px; display: none; }

    /* ── Map ── */
    #map { flex: 1; }

    /* ── Popup ── */
    .popup-type  { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; margin-bottom: 2px; }
    .popup-title { font-weight: 700; font-size: 14px; margin-bottom: 4px; }
    .popup-addr  { font-size: 12px; color: #666; margin-bottom: 5px; }
    .popup-row   { font-size: 12px; margin-bottom: 3px; }
    .popup-links { display: flex; gap: 5px; margin-top: 8px; flex-wrap: wrap; }
    .popup-link  { display: inline-block; padding: 4px 10px; border-radius: 4px; text-decoration: none; font-size: 11px; color: #fff !important; }
    .popup-link.city { background: #1a6e3c; }
    .popup-link.osm  { background: #3949ab; }

    /* ── Loading ── */
    #loading {
      position: fixed; inset: 0; background: rgba(255,255,255,.92);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      z-index: 9999; gap: 10px;
    }
    .spinner {
      width: 36px; height: 36px; border: 4px solid #ddd;
      border-top-color: #1a6e3c; border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-text { font-size: 14px; color: #555; }
    #loading small { font-size: 11px; color: #aaa; }

    @media (max-width: 640px) {
      body { flex-direction: column; }
      #sidebar { width: 100%; height: 50dvh; }
      #map { height: 50dvh; }
    }
  </style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <p id="loading-text">Loading data…</p>
  <small>OpenStreetMap · Stadt Zürich OGD</small>
</div>

<div id="sidebar">
  <div id="sidebar-header">
    <h1>🛝🔥🧺 Zürich Outdoor</h1>
    <p>Playgrounds · BBQ Spots · Picnic Areas</p>
    <span id="count-badge">Loading…</span>
  </div>

  <div id="categories">
    <div id="categories-label">Categories — click to show / hide</div>
    <div id="cat-grid">
      <button class="cat-btn active" data-cat="sp_city">
        <span class="cb-icon">🛝</span>
        <span class="cb-text">Playgrounds<br><span class="cb-count" id="cnt-sp_city">City ZH</span></span>
      </button>
      <button class="cat-btn active" data-cat="sp_osm">
        <span class="cb-icon">🛝</span>
        <span class="cb-text">Playgrounds<br><span class="cb-count" id="cnt-sp_osm">OSM</span></span>
      </button>
      <button class="cat-btn active" data-cat="bbq">
        <span class="cb-icon">🔥</span>
        <span class="cb-text">BBQ Spots<br><span class="cb-count" id="cnt-bbq">OSM</span></span>
      </button>
      <button class="cat-btn active" data-cat="picnic">
        <span class="cb-icon">🧺</span>
        <span class="cb-text">Picnic Areas<br><span class="cb-count" id="cnt-picnic">OSM</span></span>
      </button>
    </div>
  </div>

  <div id="filters">
    <div>
      <span class="filter-label">Search</span>
      <input type="text" id="search" placeholder="Name, address, equipment…" />
    </div>
    <div>
      <span class="filter-label">Age group <span style="font-weight:400;text-transform:none;">(City ZH playgrounds only)</span></span>
      <select id="age-filter">
        <option value="">All ages</option>
        <option value="0 - 5">0 – 5 years</option>
        <option value="0 - 9">0 – 9 years</option>
        <option value="0 - 16">0 – 16 years</option>
      </select>
    </div>
    <div>
      <span class="filter-label">Equipment <span style="font-weight:400;text-transform:none;">(City ZH playgrounds only)</span></span>
      <div id="equipment-filter"></div>
    </div>
    <div id="filter-actions">
      <button id="btn-locate">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="12" cy="12" r="3"/><path d="M12 2v3M12 19v3M2 12h3M19 12h3"/>
        </svg>
        Near me
      </button>
      <button id="btn-clear">Reset all</button>
    </div>
  </div>

  <div id="list">
    <div id="no-results">No results found.</div>
  </div>
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
<script>
// ── Config ─────────────────────────────────────────────
const OVERPASS = 'https://overpass-api.de/api/interpreter';
const WFS_URL  = 'https://www.ogd.stadt-zuerich.ch/wfs/geoportal/POI_oeffentliche_Spielplaetze'
  + '?SERVICE=WFS&REQUEST=GetFeature&VERSION=1.1.0&TYPENAME=poi_spielplatz_view&OUTPUTFORMAT=GML3&SRSNAME=EPSG:4326';

const CITY_MAP_URL = id =>
  `https://www.maps.stadt-zuerich.ch/zueriplan3/Stadtplan.aspx?#basemap=Stadtplan&scale=2000&layer=Spielplatz&selectedObject=${id}&selectedLayer=Spielplatz`;
const OSM_URL = (type, id) => `https://www.openstreetmap.org/${type}/${id}`;

const CAT = {
  sp_city: { color: '#1a6e3c', emoji: '🛝', label: 'Playground (City ZH)' },
  sp_osm:  { color: '#388e3c', emoji: '🛝', label: 'Playground (OSM)'      },
  bbq:     { color: '#c62828', emoji: '🔥', label: 'BBQ Spot'              },
  picnic:  { color: '#e65100', emoji: '🧺', label: 'Picnic Area'           },
};

// Equipment chips: { label (English), match (German substring, lowercase) }
// Derived from actual Stadt ZH WFS data — counts in comments
const EQUIPMENT_CHIPS = [
  { label: 'Swing',           match: 'schaukel'       }, // Brettschaukel 111, Korbschaukel 27, etc.
  { label: 'Nest Swing',      match: 'korbschaukel'   }, // 27
  { label: 'Slide',           match: 'rutsche'        }, // Hangrutsche 27, Bockrutsche 21, Rutsche 11, etc.
  { label: 'Sand',            match: 'sand'           }, // Sandbereich 79, Sandkasten 22, etc.
  { label: 'Climbing Frame',  match: 'kletter'        }, // Kletteranlage 57+7, Kletterelement 25, etc.
  { label: 'Spring Rocker',   match: 'wippe'          }, // Federwippe 70, Balkenwippe 13, Schwingwippe 7
  { label: 'Table Tennis',    match: 'tischtennistisch'}, // 31
  { label: 'Balance',         match: 'balancier'      }, // Balanciergerät 44
  { label: 'Water Play',      match: 'wasser'         }, // Wasserspiel 15, Wasserförderanlage 14
  { label: 'Water Pump',      match: 'pumpe'          }, // Pumpe 21, Pumpen 11
  { label: 'Playhouse',       match: 'spielhaus'      }, // 17
  { label: 'Hammock',         match: 'hängematte'     }, // 16
  { label: 'Roundabout',      match: 'karussell'      }, // Sitzkarussell 10, Karussell 2
  { label: 'Zip Line',        match: 'seilbahn'       }, // 7
  { label: 'Mud Table',       match: 'matschtisch'    }, // 6
  { label: 'Paddling Pool',   match: 'planschbecken'  }, // 2
  { label: 'Trampoline',      match: 'trampolin'      }, // 1
];

// ── State ──────────────────────────────────────────────
let allItems    = [];
let markers     = {};
let activeCats  = new Set(Object.keys(CAT));
let activeEquip = new Set();  // stores match strings
let userLat = null, userLng = null;
let lastKey = null;
let clusterGroups = {};

// ── Map ────────────────────────────────────────────────
const map = L.map('map').setView([47.3769, 8.5417], 13);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors | Stadt Zürich OGD',
  maxZoom: 19,
}).addTo(map);

Object.keys(CAT).forEach(cat => {
  clusterGroups[cat] = L.markerClusterGroup({ maxClusterRadius: 50 });
  map.addLayer(clusterGroups[cat]);
});

// ── Icons ──────────────────────────────────────────────
function makeIcon(color, emoji, size) {
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border:2px solid #fff;border-radius:50%;box-shadow:0 2px 4px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*.45)}px;">${emoji}</div>`,
    iconSize: [size, size], iconAnchor: [size/2, size/2],
  });
}
const icons = {};
Object.entries(CAT).forEach(([cat, c]) => { icons[cat] = makeIcon(c.color, c.emoji, 26); });
const iconHL = makeIcon('#37474f', '📍', 32);

// ── Parse WFS GML ──────────────────────────────────────
function parseWFS(xml) {
  const doc = new DOMParser().parseFromString(xml, 'text/xml');
  const byRef = {};
  doc.querySelectorAll('featureMember').forEach(m => {
    const g = tag => { const el = m.querySelector(tag); return el && !el.getAttribute('xsi:nil') ? el.textContent.trim() : ''; };
    const posEl = m.querySelector('pos');
    if (!posEl) return;
    const [lng, lat] = posEl.textContent.trim().split(' ').map(Number);
    const ref = g('nummer');
    if (ref) byRef[ref] = {
      poiId: g('poi_id'), lat, lng,
      name: g('name'), address: g('adresse'),
      age: g('eignung'), equipment: g('geraete'),
      elements: g('elemente'), special: g('besonderes'),
    };
  });
  return byRef;
}

// ── Determine category ─────────────────────────────────
function getCat(tags, hasCityData) {
  if (tags.amenity === 'bbq')         return 'bbq';
  if (tags.tourism === 'picnic_site') return 'picnic';
  return hasCityData ? 'sp_city' : 'sp_osm';
}

// ── Build items ────────────────────────────────────────
function buildItems(osmEls, wfsByRef) {
  return osmEls.map(el => {
    const tags = el.tags || {};
    const lat  = el.type === 'node' ? el.lat : el.center?.lat;
    const lng  = el.type === 'node' ? el.lon : el.center?.lon;
    if (!lat || !lng) return null;

    const osmRef = tags.ref ? tags.ref.replace(/\D/g,'') : null;
    const city   = (tags.leisure === 'playground' && osmRef) ? wfsByRef[osmRef] : null;
    const cat    = getCat(tags, !!city);

    return {
      key: `${el.type}-${el.id}`,
      osmId: el.id, osmType: el.type,
      cat, lat, lng,
      name:         city?.name        || tags.name      || tags.alt_name || '',
      address:      city?.address     || tags['addr:street'] || '',
      operator:     tags.operator     || '',
      surface:      tags.surface      || '',
      wheelchair:   tags.wheelchair   || '',
      covered:      tags.covered      || '',
      fireplace:    tags.fireplace    || '',
      openingHours: tags.opening_hours|| '',
      poiId:        city?.poiId       || null,
      age:          city?.age         || '',
      equipment:    city?.equipment   || '',
      elements:     city?.elements    || '',
      special:      city?.special     || '',
    };
  }).filter(Boolean);
}

// ── Popup ──────────────────────────────────────────────
function buildPopup(p) {
  const c = CAT[p.cat];
  const rows = [];
  if (p.age) rows.push(`<div class="popup-row"><strong>Age:</strong> ${p.age.replace('Jahre','years')}</div>`);
  if (p.equipment) {
    const chips = p.equipment.split(',').map(e =>
      `<span style="display:inline-block;background:#e8f5ee;color:#1a6e3c;border-radius:10px;padding:1px 7px;font-size:11px;margin:2px 1px;">${e.trim()}</span>`
    ).join('');
    rows.push(`<div class="popup-row"><strong>Equipment:</strong><br>${chips}</div>`);
  }
  if (p.elements)           rows.push(`<div class="popup-row"><strong>Features:</strong> ${p.elements}</div>`);
  if (p.surface)            rows.push(`<div class="popup-row"><strong>Surface:</strong> ${p.surface}</div>`);
  if (p.covered==='yes')    rows.push(`<div class="popup-row">🏠 Covered</div>`);
  if (p.fireplace==='yes')  rows.push(`<div class="popup-row">🔥 Fireplace available</div>`);
  if (p.wheelchair==='yes') rows.push(`<div class="popup-row">♿ Wheelchair accessible</div>`);
  if (p.operator)           rows.push(`<div class="popup-row"><strong>Operator:</strong> ${p.operator}</div>`);
  if (p.openingHours)       rows.push(`<div class="popup-row"><strong>Hours:</strong> ${p.openingHours}</div>`);
  if (p.special)            rows.push(`<div class="popup-row" style="color:#777;font-style:italic">${p.special}</div>`);

  const links = [];
  if (p.poiId) links.push(`<a class="popup-link city" href="${CITY_MAP_URL(p.poiId)}" target="_blank" rel="noopener">City ZH Map →</a>`);
  links.push(`<a class="popup-link osm" href="${OSM_URL(p.osmType,p.osmId)}" target="_blank" rel="noopener">OpenStreetMap →</a>`);

  return `<div style="min-width:220px;max-width:290px;">
    <div class="popup-type" style="color:${c.color};">${c.label}</div>
    <div class="popup-title">${p.name || c.label}</div>
    ${p.address ? `<div class="popup-addr">📍 ${p.address}</div>` : ''}
    ${rows.join('')}
    <div class="popup-links">${links.join('')}</div>
  </div>`;
}

// ── Distance ───────────────────────────────────────────
function haversine(lat1,lng1,lat2,lng2) {
  const R=6371000,r=Math.PI/180,dLat=(lat2-lat1)*r,dLng=(lng2-lng1)*r;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*r)*Math.cos(lat2*r)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
const fmtDist = m => m < 1000 ? `${Math.round(m)} m` : `${(m/1000).toFixed(1)} km`;

// ── Filter ─────────────────────────────────────────────
function getFiltered() {
  const q   = document.getElementById('search').value.toLowerCase();
  const age = document.getElementById('age-filter').value;
  return allItems.filter(p => {
    if (!activeCats.has(p.cat)) return false;
    if (q) {
      const hay = `${p.name} ${p.address} ${p.equipment} ${p.elements} ${p.operator} ${p.special}`.toLowerCase();
      if (!hay.includes(q)) return false;
    }
    if (age && !p.age.includes(age)) return false;
    if (activeEquip.size > 0) {
      if (!p.equipment) return false;
      const eq = p.equipment.toLowerCase();
      for (const m of activeEquip) if (!eq.includes(m)) return false;
    }
    return true;
  });
}

// ── Render list ────────────────────────────────────────
function renderList(filtered) {
  document.querySelectorAll('.item').forEach(el => el.remove());
  document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';

  const sorted = [...filtered].sort((a,b) => {
    if (userLat !== null) return haversine(userLat,userLng,a.lat,a.lng) - haversine(userLat,userLng,b.lat,b.lng);
    const order = {sp_city:0, sp_osm:1, bbq:2, picnic:3};
    if (a.cat !== b.cat) return order[a.cat] - order[b.cat];
    return (a.name||'zzz').localeCompare(b.name||'zzz','en');
  });

  const list = document.getElementById('list');
  sorted.forEach(p => {
    const c    = CAT[p.cat];
    const item = document.createElement('div');
    item.className   = 'item';
    item.dataset.key = p.key;

    const tags = [];
    if (p.age) tags.push(`<span class="tag age">${p.age.replace('Jahre','yrs')}</span>`);
    if (p.cat === 'bbq')    tags.push(`<span class="tag red">🔥 BBQ</span>`);
    if (p.cat === 'picnic') tags.push(`<span class="tag amber">🧺 Picnic</span>`);
    if (p.covered==='yes')  tags.push(`<span class="tag">🏠 covered</span>`);
    if (p.fireplace==='yes')tags.push(`<span class="tag red">🔥 fireplace</span>`);
    if (p.wheelchair==='yes')tags.push(`<span class="tag">♿</span>`);
    if (p.equipment) {
      p.equipment.split(',').slice(0,3).forEach(e => tags.push(`<span class="tag">${e.trim()}</span>`));
      if (p.equipment.split(',').length > 3) tags.push(`<span class="tag">+${p.equipment.split(',').length-3}</span>`);
    }

    const sub  = p.address || p.operator || (p.cat==='sp_city' ? 'City of Zurich' : p.cat==='sp_osm' ? 'OpenStreetMap' : '');
    const dist = userLat !== null ? `<div class="item-dist">📍 ${fmtDist(haversine(userLat,userLng,p.lat,p.lng))}</div>` : '';

    item.innerHTML = `
      <div class="item-dot" style="background:${c.color};"></div>
      <div class="item-body">
        <div class="item-name">${p.name || `<span style="color:#aaa;font-style:italic">${c.label}</span>`}</div>
        ${sub ? `<div class="item-sub">${sub}</div>` : ''}
        <div class="item-tags">${tags.join('')}</div>
        ${dist}
      </div>`;
    item.addEventListener('click', () => highlight(p.key));
    list.appendChild(item);
  });
}

// ── Update map ─────────────────────────────────────────
function updateMap(filtered) {
  Object.values(clusterGroups).forEach(g => g.clearLayers());
  markers = {};
  filtered.forEach(p => {
    const m = L.marker([p.lat,p.lng], { icon: icons[p.cat] })
      .bindPopup(buildPopup(p), { maxWidth: 320 });
    m.on('click', () => {
      document.querySelectorAll('.item').forEach(el => el.classList.toggle('highlighted', el.dataset.key===p.key));
      document.querySelector(`.item[data-key="${p.key}"]`)?.scrollIntoView({ behavior:'smooth', block:'nearest' });
      lastKey = p.key;
    });
    markers[p.key] = m;
    clusterGroups[p.cat].addLayer(m);
  });
}

function highlight(key) {
  if (lastKey && markers[lastKey]) {
    const prev = allItems.find(p=>p.key===lastKey);
    if (prev) markers[lastKey].setIcon(icons[prev.cat]);
  }
  document.querySelectorAll('.item').forEach(el => el.classList.toggle('highlighted', el.dataset.key===key));
  const m = markers[key];
  const p = allItems.find(x=>x.key===key);
  if (m && p) { m.setIcon(iconHL); clusterGroups[p.cat].zoomToShowLayer(m, ()=>m.openPopup()); }
  lastKey = key;
}

// ── Apply filters ──────────────────────────────────────
function applyFilters() {
  const filtered = getFiltered();
  const total={}, show={};
  Object.keys(CAT).forEach(c=>{total[c]=0;show[c]=0;});
  allItems.forEach(p=>total[p.cat]++);
  filtered.forEach(p=>show[p.cat]++);
  Object.keys(CAT).forEach(cat => {
    document.getElementById(`cnt-${cat}`).textContent = `${show[cat]} / ${total[cat]}`;
  });
  document.getElementById('count-badge').textContent = `${filtered.length} of ${allItems.length} results`;
  renderList(filtered);
  updateMap(filtered);
}

// ── Category buttons ───────────────────────────────────
document.querySelectorAll('.cat-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const cat = btn.dataset.cat;
    if (activeCats.has(cat)) { activeCats.delete(cat); map.removeLayer(clusterGroups[cat]); }
    else                     { activeCats.add(cat);    map.addLayer(clusterGroups[cat]);    }
    btn.classList.toggle('active', activeCats.has(cat));
    applyFilters();
  });
});

// ── Equipment chips ────────────────────────────────────
function buildChips() {
  const container = document.getElementById('equipment-filter');
  EQUIPMENT_CHIPS.forEach(({ label, match }) => {
    const chip = document.createElement('span');
    chip.className   = 'equip-chip';
    chip.textContent = label;
    chip.dataset.match = match;
    chip.addEventListener('click', () => {
      activeEquip.has(match) ? activeEquip.delete(match) : activeEquip.add(match);
      chip.classList.toggle('active');
      applyFilters();
    });
    container.appendChild(chip);
  });
}

// ── Locate ─────────────────────────────────────────────
document.getElementById('btn-locate').addEventListener('click', () => {
  if (!navigator.geolocation) return alert('Geolocation is not available in your browser.');
  navigator.geolocation.getCurrentPosition(pos => {
    userLat = pos.coords.latitude; userLng = pos.coords.longitude;
    L.circleMarker([userLat,userLng],{radius:8,color:'#1a6e3c',fillOpacity:.8})
      .addTo(map).bindPopup('Your location');
    map.setView([userLat,userLng],15);
    applyFilters();
  }, ()=>alert('Could not determine your location. Please allow location access.'));
});

// ── Reset ──────────────────────────────────────────────
document.getElementById('btn-clear').addEventListener('click', () => {
  document.getElementById('search').value = '';
  document.getElementById('age-filter').value = '';
  activeEquip.clear();
  document.querySelectorAll('.equip-chip').forEach(c=>c.classList.remove('active'));
  activeCats = new Set(Object.keys(CAT));
  document.querySelectorAll('.cat-btn').forEach(b => {
    b.classList.add('active');
    map.addLayer(clusterGroups[b.dataset.cat]);
  });
  userLat = null; userLng = null;
  applyFilters();
  map.setView([47.3769,8.5417],13);
});

document.getElementById('search').addEventListener('input', applyFilters);
document.getElementById('age-filter').addEventListener('change', applyFilters);

// ── Load data ──────────────────────────────────────────
async function loadData() {
  const txt = document.getElementById('loading-text');
  try {
    txt.textContent = 'Loading OSM data…';
    const query = `[out:json][timeout:60];
area["name"="Zürich"]["admin_level"="8"]->.a;
(
  node["leisure"="playground"](area.a);
  way["leisure"="playground"](area.a);
  node["amenity"="bbq"](area.a);
  node["tourism"="picnic_site"](area.a);
  way["tourism"="picnic_site"](area.a);
);
out center tags;`;

    const [osmRes, wfsRes] = await Promise.all([
      fetch(OVERPASS, { method:'POST', body:query }),
      fetch(WFS_URL),
    ]);
    txt.textContent = 'Processing…';
    const [osmJson, wfsXml] = await Promise.all([osmRes.json(), wfsRes.text()]);

    allItems = buildItems(osmJson.elements||[], parseWFS(wfsXml));
    buildChips();
    applyFilters();
    document.getElementById('loading').style.display = 'none';
  } catch(err) {
    document.getElementById('loading').innerHTML =
      `<p style="color:#c00;padding:20px;text-align:center;">Error loading data:<br>${err.message}</p>`;
  }
}

loadData();
</script>
</body>
</html>
